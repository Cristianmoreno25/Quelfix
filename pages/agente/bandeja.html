<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bandeja — Quelfix</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/components/sidebar.css" />
  <link rel="stylesheet" href="/css/components/agente.css" />
</head>
<body>
  <main class="page-content">

    <div class="page-header">
      <div>
        <h1 class="page-title">Bandeja de tickets</h1>
        <p class="page-subtitle" id="bandeja-subtitle">Tickets asignados a ti</p>
      </div>
    </div>

    <!-- Stats -->
    <div class="bandeja-stats" id="bandeja-stats">
      <div class="bandeja-stat-skeleton"></div>
      <div class="bandeja-stat-skeleton"></div>
      <div class="bandeja-stat-skeleton"></div>
    </div>

    <!-- Filtros -->
    <div class="filter-bar">
      <div class="filter-search-wrap">
        <svg class="filter-search-icon" viewBox="0 0 20 20" fill="currentColor" width="15" height="15">
          <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
        </svg>
        <input
          type="search"
          id="filter-search"
          class="filter-input filter-input--search"
          placeholder="Buscar por título o ID…"
          autocomplete="off"
        />
      </div>
      <select id="filter-estado" class="filter-select">
        <option value="">Todos los estados</option>
        <option value="abierto">Abierto</option>
        <option value="en_proceso">En proceso</option>
        <option value="en_revision">En revisión</option>
        <option value="resuelto">Resuelto</option>
      </select>
      <select id="filter-prioridad" class="filter-select">
        <option value="">Todas las prioridades</option>
        <option value="critica">Crítica</option>
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>
      <button id="filter-clear" class="filter-clear" style="display:none">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
          <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/>
        </svg>
        Limpiar
      </button>
    </div>

    <!-- Lista -->
    <div id="bandeja-list" class="bandeja-list">
      <div class="bandeja-card-skeleton"></div>
      <div class="bandeja-card-skeleton"></div>
      <div class="bandeja-card-skeleton"></div>
      <div class="bandeja-card-skeleton"></div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/core/auth.js"></script>
  <script src="/js/core/notifications.js"></script>
  <script src="/js/core/sidebar.js"></script>
  <script src="/js/utils/helpers.js"></script>
  <script src="/js/pages/bandeja.js"></script>
</body>
</html>
