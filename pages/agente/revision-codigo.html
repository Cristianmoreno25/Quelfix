<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revisión de código — Quelfix</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/components/sidebar.css" />
  <link rel="stylesheet" href="/css/components/agente.css" />
</head>
<body>
  <main class="page-content">

    <div class="page-header">
      <div>
        <h1 class="page-title">Revisión de código</h1>
        <p class="page-subtitle">Evalúa los tickets asignados para revisión</p>
      </div>
    </div>

    <div class="revision-layout">

      <!-- Panel izquierdo: lista de tickets -->
      <aside class="revision-list-panel">
        <div class="revision-list-panel__head">Tickets a revisar</div>
        <div class="revision-list-panel__items" id="revision-ticket-list">
          <div style="padding:1rem;animation:skeleton-pulse 1.4s infinite">
            <div style="height:14px;background:var(--color-border);border-radius:4px;margin-bottom:0.5rem"></div>
            <div style="height:10px;background:var(--color-border);border-radius:4px;width:60%"></div>
          </div>
        </div>
      </aside>

      <!-- Panel derecho: formulario -->
      <div class="revision-form-panel" id="revision-form-panel">
        <div class="revision-placeholder">
          <svg viewBox="0 0 20 20" fill="currentColor" width="40" height="40" style="color:var(--color-border)">
            <path fill-rule="evenodd" d="M4.25 2A2.25 2.25 0 002 4.25v11.5A2.25 2.25 0 004.25 18h11.5A2.25 2.25 0 0018 15.75V4.25A2.25 2.25 0 0015.75 2H4.25zm4.03 6.28a.75.75 0 00-1.06-1.06L4.97 9.47a.75.75 0 000 1.06l2.25 2.25a.75.75 0 001.06-1.06L6.56 10l1.72-1.72zm4.5-1.06a.75.75 0 10-1.06 1.06L13.44 10l-1.72 1.72a.75.75 0 101.06 1.06l2.25-2.25a.75.75 0 000-1.06l-2.25-2.25z" clip-rule="evenodd"/>
          </svg>
          <p>Selecciona un ticket de la lista para comenzar la revisión</p>
        </div>
      </div>

    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/core/auth.js"></script>
  <script src="/js/core/notifications.js"></script>
  <script src="/js/core/sidebar.js"></script>
  <script src="/js/utils/helpers.js"></script>
  <script src="/js/pages/revision-codigo.js"></script>
</body>
</html>
