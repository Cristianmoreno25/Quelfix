<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notificaciones — Quelfix</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/components/sidebar.css" />
  <link rel="stylesheet" href="/css/components/notificaciones.css" />
</head>
<body>
  <main class="page-content">

    <div class="page-header">
      <div>
        <h1 class="page-title">Notificaciones</h1>
        <p class="page-subtitle">Mantente al tanto de los cambios en tus tickets</p>
      </div>
      <button class="notif-mark-all-btn" id="mark-all-btn" disabled>
        <svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15">
          <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd"/>
        </svg>
        Marcar todas como leídas
      </button>
    </div>

    <div class="notif-toolbar">
      <div class="notif-tabs" id="notif-tabs" role="tablist">
        <button class="notif-tab notif-tab--active" data-filter="todas" role="tab" aria-selected="true">
          Todas
        </button>
        <button class="notif-tab" data-filter="no_leidas" role="tab" aria-selected="false">
          No leídas
          <span class="notif-unread-count" id="unread-count" style="display:none">0</span>
        </button>
      </div>
    </div>

    <div class="notif-list" id="notif-list">
      <div class="notif-skeleton"></div>
      <div class="notif-skeleton"></div>
      <div class="notif-skeleton"></div>
      <div class="notif-skeleton"></div>
      <div class="notif-skeleton"></div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/core/auth.js"></script>
  <script src="/js/core/notifications.js"></script>
  <script src="/js/core/sidebar.js"></script>
  <script src="/js/utils/helpers.js"></script>
  <script src="/js/pages/notificaciones.js"></script>
</body>
</html>
