<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tickets — Quelfix</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/components/sidebar.css" />
  <link rel="stylesheet" href="/css/components/admin.css" />
</head>
<body>
  <main class="page-content">

    <!-- Header -->
    <div class="page-header">
      <div>
        <h1 class="page-title">Tickets</h1>
        <p class="page-subtitle" id="tickets-count">Cargando...</p>
      </div>
    </div>

    <!-- Filtros -->
    <div class="filter-bar" id="filter-bar">
      <div class="filter-search-wrap">
        <svg class="filter-search-icon" viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
          <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
        </svg>
        <input
          type="search"
          id="filter-search"
          class="filter-input filter-input--search"
          placeholder="Buscar por título o ID…"
          autocomplete="off"
        />
      </div>

      <select id="filter-estado" class="filter-select">
        <option value="">Todos los estados</option>
        <option value="abierto">Abierto</option>
        <option value="en_progreso">En progreso</option>
        <option value="pendiente_revision">Pendiente revisión</option>
        <option value="resuelto">Resuelto</option>
        <option value="cerrado">Cerrado</option>
      </select>

      <select id="filter-prioridad" class="filter-select">
        <option value="">Todas las prioridades</option>
        <option value="critica">Crítica</option>
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>

      <button id="filter-clear" class="filter-clear" style="display:none">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
          <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/>
        </svg>
        Limpiar filtros
      </button>
    </div>

    <!-- Tabla -->
    <div class="dash-card tickets-table-card">
      <div id="tickets-table-wrap"></div>
    </div>

    <!-- Paginación -->
    <div class="pagination" id="pagination" style="display:none">
      <button class="pagination__btn" id="page-prev" disabled>
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
          <path fill-rule="evenodd" d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z" clip-rule="evenodd"/>
        </svg>
        Anterior
      </button>
      <span class="pagination__info" id="page-info"></span>
      <button class="pagination__btn" id="page-next">
        Siguiente
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
          <path fill-rule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z" clip-rule="evenodd"/>
        </svg>
      </button>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/core/auth.js"></script>
  <script src="/js/core/notifications.js"></script>
  <script src="/js/core/sidebar.js"></script>
  <script src="/js/utils/helpers.js"></script>
  <script src="/js/pages/admin-tickets.js"></script>
</body>
</html>
