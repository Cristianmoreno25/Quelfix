<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reasignar tickets — Quelfix</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/components/sidebar.css" />
  <link rel="stylesheet" href="/css/components/admin.css" />
</head>
<body>
  <main class="page-content">

    <!-- Header -->
    <div class="page-header">
      <div>
        <h1 class="page-title">Reasignar tickets</h1>
        <p class="page-subtitle">Selecciona un ticket y un desarrollador para reasignar</p>
      </div>
    </div>

    <!-- Grid de dos paneles -->
    <div class="reasignar-grid">

      <!-- Panel izquierdo: tickets -->
      <section class="dash-card reasignar-panel">
        <div class="dash-card__head">
          <h3 class="dash-card__title">Tickets activos</h3>
          <span id="tickets-count-badge" class="reasignar-badge">0</span>
        </div>

        <div class="reasignar-panel__filters">
          <div class="filter-search-wrap">
            <svg class="filter-search-icon" viewBox="0 0 20 20" fill="currentColor" width="15" height="15">
              <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
            </svg>
            <input
              type="search"
              id="ticket-search"
              class="filter-input filter-input--search filter-input--sm"
              placeholder="Buscar ticket…"
              autocomplete="off"
            />
          </div>
          <select id="ticket-filter-estado" class="filter-select filter-select--sm">
            <option value="">Todos</option>
            <option value="abierto">Abierto</option>
            <option value="en_progreso">En progreso</option>
            <option value="pendiente_revision">Pend. revisión</option>
            <option value="resuelto">Resuelto</option>
          </select>
        </div>

        <div class="reasignar-list" id="tickets-list">
          <!-- Skeleton -->
          <div class="reasignar-skeleton"></div>
          <div class="reasignar-skeleton"></div>
          <div class="reasignar-skeleton"></div>
        </div>
      </section>

      <!-- Panel derecho: desarrolladores -->
      <section class="dash-card reasignar-panel">
        <div class="dash-card__head">
          <h3 class="dash-card__title">Desarrolladores</h3>
          <span id="devs-count-badge" class="reasignar-badge">0</span>
        </div>

        <div class="reasignar-panel__filters">
          <div class="filter-search-wrap">
            <svg class="filter-search-icon" viewBox="0 0 20 20" fill="currentColor" width="15" height="15">
              <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
            </svg>
            <input
              type="search"
              id="dev-search"
              class="filter-input filter-input--search filter-input--sm"
              placeholder="Buscar desarrollador…"
              autocomplete="off"
            />
          </div>
        </div>

        <div class="reasignar-list" id="devs-list">
          <div class="reasignar-skeleton"></div>
          <div class="reasignar-skeleton"></div>
          <div class="reasignar-skeleton"></div>
        </div>
      </section>

    </div>

    <!-- Barra de acción fija -->
    <div class="reasignar-action-bar" id="action-bar">
      <div class="reasignar-action-bar__summary" id="action-summary">
        <span class="action-placeholder">Selecciona un ticket y un desarrollador</span>
      </div>
      <button class="reasignar-action-btn" id="reasignar-btn" disabled>
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
          <path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 01-9.201 2.466l-.312-.311h2.433a.75.75 0 000-1.5H3.989a.75.75 0 00-.75.75v4.242a.75.75 0 001.5 0v-2.43l.31.31a7 7 0 0011.712-3.138.75.75 0 00-1.449-.389zm1.23-3.723a.75.75 0 00.219-.53V2.929a.75.75 0 00-1.5 0V5.36l-.31-.31A7 7 0 003.239 8.188a.75.75 0 101.448.389A5.5 5.5 0 0113.89 6.11l.311.31h-2.432a.75.75 0 000 1.5h4.243a.75.75 0 00.53-.219z" clip-rule="evenodd"/>
        </svg>
        Reasignar
      </button>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/core/auth.js"></script>
  <script src="/js/core/notifications.js"></script>
  <script src="/js/core/sidebar.js"></script>
  <script src="/js/utils/helpers.js"></script>
  <script src="/js/pages/admin-reasignar.js"></script>
</body>
</html>
