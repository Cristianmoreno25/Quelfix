<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Quelfix</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/pages/login.css" />
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-header">
      <h1 class="login-title">Quelfix</h1>
      <p class="login-subtitle">Sistema de gestión de tickets</p>
    </div>

    <form id="login-form" class="login-form" novalidate>
      <div class="form-group">
        <label for="email" class="form-label">Correo electrónico</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="usuario@ejemplo.com"
          autocomplete="email"
          required
        />
        <span id="email-error" class="form-error"></span>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Contraseña</label>
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
        <span id="password-error" class="form-error"></span>
      </div>

      <p id="login-error" class="form-error form-error--global" aria-live="polite"></p>

      <button type="submit" id="login-btn" class="btn btn--primary btn--full">
        Iniciar sesión
      </button>
    </form>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- Core -->
  <script src="/js/config.js"></script>
  <script src="/js/core/auth.js"></script>
  <script src="/js/utils/validators.js"></script>
  <!-- Controlador de página -->
  <script src="/js/pages/login.js"></script>
</body>
</html>
