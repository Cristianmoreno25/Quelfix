<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z2C28RCM3V"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Z2C28RCM3V');
  </script>
  <title>Iniciar sesión — Quelfix</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/pages/login.css" />
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-aside">
      <a href="/index.html" class="login-back">Volver al inicio</a>
      <h1 class="login-brand">Quelfix</h1>
      <p class="login-tagline">Gestiona soporte técnico con flujo claro, trazabilidad y revisiones de código.</p>
      <ul class="login-points">
        <li>Asignación automática de tickets</li>
        <li>Notificaciones en tiempo real</li>
        <li>Historial completo de estados</li>
      </ul>
    </section>

    <section class="login-card" aria-label="Formulario de acceso">
      <div class="login-header">
        <h2 class="login-title">Iniciar sesión</h2>
        <p class="login-subtitle">Accede a tu panel según tu rol</p>
      </div>

      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">Correo electrónico</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="usuario@ejemplo.com"
            autocomplete="email"
            required
          />
          <span id="email-error" class="form-error"></span>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Contraseña</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Minimo 6 caracteres"
            autocomplete="current-password"
            required
          />
          <span id="password-error" class="form-error"></span>
        </div>

        <p id="login-error" class="form-error form-error--global" aria-live="polite"></p>

        <button type="submit" id="login-btn" class="login-btn login-btn--primary">
          Iniciar sesión
        </button>

        <div class="login-actions">
          <a href="/forgot-password.html" class="login-link-btn">
            Recuperar contraseña
          </a>
          <a href="/register.html" class="login-link-btn login-link-btn--accent">
            Registrarse
          </a>
        </div>
      </form>
    </section>
  </main>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- Core -->
  <script src="/js/config.js"></script>
  <script src="/js/core/auth.js"></script>
  <script src="/js/core/notifications.js"></script>
  <script src="/js/utils/validators.js"></script>
  <!-- Controlador de página -->
  <script src="/js/pages/login.js"></script>
</body>
</html>
